<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SmartDesk - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#fefcff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#001c3b",
                        "secondary-fixed": "#e2e2e2",
                        "surface-bright": "#fff8f6",
                        "surface-dim": "#f3d3cb",
                        "surface-container-high": "#ffe2db",
                        "on-surface-variant": "#5d4039",
                        "primary-fixed-dim": "#ffb4a2",
                        "secondary-fixed-dim": "#c6c6c7",
                        "on-secondary-fixed-variant": "#454747",
                        "surface-tint": "#b52700",
                        "on-tertiary-fixed-variant": "#004787",
                        "surface-variant": "#fcdbd4",
                        "outline-variant": "#e7bdb4",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#dd3200",
                        "on-error-container": "#93000a",
                        "surface-container": "#ffe9e4",
                        "inverse-on-surface": "#ffede9",
                        "surface": "#fff8f6",
                        "primary-fixed": "#ffdad2",
                        "on-surface": "#281713",
                        "surface-container-low": "#fff0ed",
                        "primary": "#b02600",
                        "on-primary-fixed": "#3d0700",
                        "on-primary-fixed-variant": "#8a1c00",
                        "background": "#fff8f6",
                        "tertiary": "#005cac",
                        "secondary": "#5d5f5f",
                        "surface-container-highest": "#fcdbd4",
                        "on-secondary-container": "#616363",
                        "error": "#ba1a1a",
                        "inverse-surface": "#402c27",
                        "error-container": "#ffdad6",
                        "secondary-container": "#dfe0e0",
                        "on-error": "#ffffff",
                        "outline": "#926f67",
                        "tertiary-container": "#0075d7",
                        "tertiary-fixed": "#d5e3ff",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#a6c8ff",
                        "on-background": "#281713",
                        "inverse-primary": "#ffb4a2",
                        "on-primary-container": "#fffbff",
                        "on-secondary-fixed": "#1a1c1c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "xs": "4px",
                        "xl": "48px",
                        "container-max": "1440px",
                        "md": "16px",
                        "sm": "8px",
                        "gutter": "24px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "h2": ["Inter"],
                        "h3": ["Inter"],
                        "body-lg": ["Inter"],
                        "h1": ["Inter"],
                        "body-md": ["Inter"],
                        "mono": ["JetBrains Mono, monospace"],
                        "body-sm": ["Inter"],
                        "label-caps": ["Inter"]
                    },
                    "fontSize": {
                        "h2": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "h3": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "h1": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "mono": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "body-sm": ["13px", { "lineHeight": "18px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-md relative overflow-hidden">
<!-- Abstract subtle background element for elegance -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-40">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-gradient-to-br from-surface-variant to-transparent blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-gradient-to-tl from-primary-fixed to-transparent blur-3xl"></div>
</div>
<!-- Login Card Level 1 Elevation -->
<main class="w-full max-w-[420px] bg-surface-container-lowest rounded-xl z-10 p-lg md:p-xl relative border border-outline-variant/30 shadow-sm" style="box-shadow: 0px 4px 6px -1px rgba(0, 0, 0, 0.05), 0px 2px 4px -1px rgba(0, 0, 0, 0.03);">
<!-- Logo Header -->
<div class="flex flex-col items-center mb-xl">
<div class="w-12 h-12 bg-surface-container flex items-center justify-center rounded-lg mb-md text-primary">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">
                    space_dashboard
                </span>
</div>
<h1 class="font-h1 text-h1 text-on-surface text-center tracking-tight">
                SmartDesk
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-sm">
                Internal Management System
            </p>
</div>
<!-- Login Form -->
<form class="flex flex-col gap-md">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm text-on-surface font-semibold" for="email">
                    Email address
                </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-[20px]">
                        mail
                    </span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-md py-sm font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs mt-sm">
<div class="flex items-center justify-between">
<label class="font-body-sm text-body-sm text-on-surface font-semibold" for="password">
                        Password
                    </label>
<a class="font-body-sm text-body-sm text-primary hover:text-on-primary-fixed-variant transition-colors" href="#">
                        Forgot password?
                    </a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none text-[20px]">
                        lock
                    </span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-md py-sm font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/50 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-body-md text-body-md font-semibold rounded-lg py-sm mt-lg hover:bg-on-primary-fixed-variant transition-colors focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container-lowest flex items-center justify-center gap-xs shadow-sm" type="submit">
                Iniciar sesión
                <span class="material-symbols-outlined text-sm">
                    arrow_forward
                </span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-xl text-center border-t border-outline-variant/30 pt-lg">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="font-body-sm text-body-sm text-primary font-semibold hover:text-on-primary-fixed-variant transition-colors ml-xs" href="#">
                    Crear cuenta
                </a>
</p>
</div>
</main>
</body></html>
